name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The generated, per-node crate layout has no incremental wins in CI and
  # incremental artifacts only bloat the cache.
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  # The type checker is deeply recursive — set a large test-thread stack
  # explicitly in the process env so it reaches the test binaries regardless of
  # whether nextest forwards .cargo/config.toml's [env]. 64 MiB clears the
  # deep-type / simplify / conformance recursion that overflows the 8 MiB default
  # (x86_64 frames are larger, so a CI runner overflows where arm64 dev does not).
  RUST_MIN_STACK: "67108864"

jobs:
  # The core suite on all three desktop platforms. luaur is pure Rust with no C
  # dependency, so it should build and pass everywhere Rust does — this proves it.
  test:
    name: Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let a failure on one OS cancel the others — we want the full
      # cross-platform picture on every run.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    # Windows cold builds of ~24 crates are the slow case; generous ceiling.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Build the whole workspace (libs + CLI bins) so a bin-only break is caught
      # even though nextest only compiles test targets.
      - name: Build workspace
        run: cargo build --workspace --locked

      # Default features: the ~5.6k translated unit tests + conformance + e2e.
      # RUST_MIN_STACK (.cargo/config.toml) and the nextest thread/timeout config
      # (.config/nextest.toml) are picked up automatically on every platform.
      - name: Test workspace (default features)
        run: cargo nextest run --workspace --locked

      # The opt-in feature surface and doctests are platform-agnostic Rust; run
      # them once (on Linux) to keep CI minutes down. `async` and `send` now
      # compose, so the matrix covers async-side, send-alone, AND send+async
      # together (the combination that used to be a compile_error). typecheck
      # pulls the type checker.
      - name: Test luaur-rt feature combos
        if: runner.os == 'Linux'
        run: |
          cargo nextest run -p luaur-rt --locked --features async,serde,macros,typecheck
          cargo nextest run -p luaur-rt --locked --features send,typecheck
          cargo nextest run -p luaur-rt --locked --features send,async,serde,macros,typecheck

      - name: Doctests (luaur + luaur-rt)
        if: runner.os == 'Linux'
        run: cargo test --doc -p luaur -p luaur-rt --locked

  # rustfmt gate — the one lint that is clean across the translated tree (clippy
  # is not: the faithful port carries thousands of intentional style warnings).
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust (+ rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  # The headline claim — the compiler, VM and type checker build for
  # wasm32-unknown-unknown with no C toolchain — verified on every push.
  wasm:
    name: Build wasm32 — luaur-web
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust (+ wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
      - name: Build luaur-web for wasm32-unknown-unknown
        run: cargo build -p luaur-web --target wasm32-unknown-unknown --features wasm --locked

  # Cache-free cold `cargo check`: a *latent* compile error in an otherwise-
  # unchanged file (e.g. issue #3's E0716 in pusherror.rs) can hide behind a warm
  # build cache — the other jobs restore `Swatinem/rust-cache`, so an unchanged
  # crate is never recompiled and its error never resurfaces. This job
  # deliberately has **no cache**, so every run type-checks the whole workspace
  # (incl. test targets) from scratch and surfaces such errors. Also checks the
  # `luaur-rt` feature surface, since features change which code is compiled.
  clean-check:
    name: Clean check (no cache)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: cargo check --workspace --all-targets (cold)
        run: cargo check --workspace --all-targets --locked
      - name: cargo check luaur-rt feature surface (cold)
        run: cargo check -p luaur-rt --all-targets --locked --features send,async,serde,macros,typecheck

  # Coverage-guided fuzzing (cargo-fuzz / libFuzzer + ASan) — a port of Luau's
  # `fuzz/` suite. Builds every target and smoke-runs each so a regression that
  # crashes/leaks the compiler, VM, type checker, or number parsers fails CI with
  # a reproducing input. The in-tree generative fuzzer
  # (`luaur-rt/tests/fuzz_generated.rs`) additionally runs in the normal test
  # suite on every platform; this job adds the ASan-instrumented, coverage-guided
  # layer. (For deep soaks, run `cargo +nightly fuzz run <target>` locally.)
  fuzz:
    name: Fuzz smoke (libFuzzer + ASan)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz"
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Build all fuzz targets
        run: cargo +nightly fuzz build
        working-directory: fuzz
      - name: Smoke-run each target (30s, ASan on)
        working-directory: fuzz
        run: |
          for t in compile run typeck typeck_defs number structured determinism; do
            echo "::group::fuzz $t"
            cargo +nightly fuzz run "$t" -- -max_total_time=30 -rss_limit_mb=4096
            echo "::endgroup::"
          done
